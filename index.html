<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Demon Slayer Quiz · 鬼滅の刃</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+JP:wght@400;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07071a;--panel:#10102a;--card:#181835;
  --gold:#f8c832;--gold2:#a87e10;--crimson:#c8173a;--ember:#e85a0a;
  --jade:#18c87a;--water:#2a8fdc;--text:#f0e8d0;--muted:#6a6285;--white:#fffef2;
  --shadow:0 8px 40px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 80% 60% at 20% -10%,rgba(200,23,58,.18) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 110%,rgba(232,90,10,.12) 0%,transparent 55%);
}
#cv{position:fixed;inset:0;pointer-events:none;z-index:999;width:100%;height:100%}
.ptcl{position:fixed;pointer-events:none;z-index:0;inset:0;overflow:hidden}
.ptcl span{position:absolute;font-size:1rem;opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(100vh) rotate(0);opacity:0}8%{opacity:.5}90%{opacity:.35}100%{transform:translateY(-60px) rotate(540deg);opacity:0}}
.scr{display:none;min-height:100vh;align-items:center;justify-content:center;padding:16px;position:relative;z-index:1;flex-direction:column}
.scr.on{display:flex}
.card{
  background:linear-gradient(145deg,rgba(30,30,64,.97),rgba(16,16,42,.98));
  border:1px solid rgba(248,200,50,.16);border-radius:24px;
  padding:28px 22px;width:100%;max-width:660px;position:relative;
  box-shadow:var(--shadow),inset 0 1px 0 rgba(248,200,50,.12);overflow:hidden;
}
.card::before{content:'';position:absolute;left:0;top:0;width:5px;height:100%;
  background:linear-gradient(180deg,var(--gold),var(--crimson),var(--gold));
  border-radius:24px 0 0 24px;}
.card-sm{max-width:460px}
.logo-title{font-family:'Cinzel',serif;font-size:clamp(1.7rem,6vw,3rem);font-weight:900;color:var(--gold);line-height:1.15;letter-spacing:2px;text-align:center;text-shadow:0 0 40px rgba(248,200,50,.55),0 2px 6px rgba(0,0,0,.9)}
.logo-jp{font-family:'Noto Serif JP',serif;font-size:.85rem;color:var(--crimson);letter-spacing:10px;text-align:center;margin-top:4px}
.logo-icon{font-size:3.2rem;display:block;text-align:center;margin-bottom:8px;animation:sway 3s ease-in-out infinite alternate;filter:drop-shadow(0 0 14px rgba(232,90,10,.7))}
@keyframes sway{from{transform:rotate(-8deg) scale(.97)}to{transform:rotate(8deg) scale(1.04)}}
.divl{height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--crimson),var(--gold),transparent);margin:12px 0}
.divd{width:10px;height:10px;background:var(--gold);transform:rotate(45deg);margin:-6px auto 10px}
.lbl{display:block;font-size:.7rem;color:var(--gold2);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;font-family:'Noto Serif JP',serif}
.inp{width:100%;padding:13px 16px;background:rgba(255,255,255,.05);border:1.5px solid rgba(248,200,50,.28);border-radius:12px;color:var(--white);font-family:'Nunito',sans-serif;font-size:1rem;outline:none;transition:border .2s,background .2s}
.inp:focus{border-color:var(--gold);background:rgba(248,200,50,.07)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border:none;border-radius:12px;font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.btn:active{transform:scale(.96)}
.btn-red{background:linear-gradient(135deg,var(--crimson) 0%,#8a0020 100%);color:var(--gold);box-shadow:0 4px 22px rgba(200,23,58,.45);width:100%}
.btn-red:hover{box-shadow:0 6px 32px rgba(200,23,58,.7);transform:translateY(-2px)}
.btn-gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#1a0e00;box-shadow:0 4px 18px rgba(248,200,50,.3)}
.btn-gold:hover{box-shadow:0 6px 28px rgba(248,200,50,.55);transform:translateY(-2px)}
.btn-outline{background:transparent;color:var(--gold);border:2px solid rgba(248,200,50,.35)}
.btn-outline:hover{border-color:var(--gold);background:rgba(248,200,50,.08)}
.btn-sm{padding:8px 18px;font-size:.72rem}
.char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
@media(max-width:380px){.char-grid{grid-template-columns:repeat(4,1fr);gap:6px}}
.char-card{border:2.5px solid rgba(255,255,255,.1);border-radius:16px;padding:10px 6px 8px;text-align:center;cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);background:rgba(255,255,255,.03);position:relative;overflow:hidden}
.char-card:hover{transform:translateY(-5px) scale(1.04);border-color:rgba(248,200,50,.5)}
.char-card.sel{transform:translateY(-6px) scale(1.06)}
.char-card.sel::after{content:'✓';position:absolute;top:5px;right:7px;font-size:.7rem;font-weight:900}
.char-name{font-size:.65rem;font-weight:800;color:var(--white);line-height:1.2;margin-top:5px}
.char-rank{font-size:.55rem;font-weight:700;margin-top:4px;padding:2px 6px;border-radius:20px;display:inline-block;letter-spacing:.5px}
.char-svg{display:flex;justify-content:center;align-items:flex-end;height:72px}
.prog-wrap{margin-bottom:18px}
.prog-bar{height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--crimson),var(--gold));border-radius:4px;transition:width .45s ease;position:relative}
.prog-fill::after{content:'';position:absolute;right:-1px;top:-3px;width:13px;height:13px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px var(--gold)}
.phase-dots{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.pd{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-family:'Cinzel',serif;transition:all .3s;border:2px solid rgba(255,255,255,.12);color:var(--muted)}
.pd.done{background:var(--gold);border-color:var(--gold);color:#1a0a00}
.pd.cur{border-color:var(--crimson);color:var(--crimson);box-shadow:0 0 12px rgba(200,23,58,.6);animation:pdp 1.5s infinite}
@keyframes pdp{0%,100%{box-shadow:0 0 8px rgba(200,23,58,.5)}50%{box-shadow:0 0 20px rgba(200,23,58,.9)}}
.timer{width:56px;height:56px;border-radius:50%;border:3.5px solid rgba(248,200,50,.25);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);background:rgba(0,0,0,.35);margin:0 auto 16px;transition:all .3s}
.timer.warn{border-color:var(--crimson);color:var(--crimson);box-shadow:0 0 22px rgba(200,23,58,.6);animation:tshk .5s ease}
@keyframes tshk{0%,100%{transform:none}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.ph-banner{text-align:center;padding:10px 12px;border-radius:12px;margin-bottom:14px;background:linear-gradient(135deg,rgba(200,23,58,.22),rgba(248,200,50,.09));border:1px solid rgba(248,200,50,.14)}
.ph-num{font-size:.62rem;color:var(--gold2);letter-spacing:4px;font-family:'Noto Serif JP',serif}
.ph-title{font-family:'Cinzel',serif;font-size:clamp(.85rem,2.5vw,1.1rem);color:var(--gold);margin-top:3px}
.q-text{text-align:center;font-family:'Noto Serif JP',serif;font-size:clamp(.95rem,2.8vw,1.13rem);color:var(--white);line-height:1.65;margin-bottom:18px;padding:0 4px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
@media(max-width:420px){.opts{grid-template-columns:1fr}}
.opt{padding:13px 14px;border:2px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.04);color:var(--text);font-family:'Nunito',sans-serif;font-size:.9rem;cursor:pointer;text-align:left;transition:all .18s;line-height:1.4;display:flex;align-items:flex-start;gap:9px}
.opt:hover:not(:disabled){border-color:rgba(248,200,50,.55);background:rgba(248,200,50,.07);transform:translateX(4px)}
.opt:disabled{cursor:default}
.opt.correct{border-color:var(--jade)!important;background:rgba(24,200,122,.18)!important;color:#7fffd4!important}
.opt.wrong{border-color:var(--crimson)!important;background:rgba(200,23,58,.2)!important;color:#ff9090!important}
.opt-ltr{width:24px;height:24px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(248,200,50,.3);background:rgba(248,200,50,.1);display:inline-flex;align-items:center;justify-content:center;font-size:.62rem;color:var(--gold2);font-family:'Cinzel',serif;margin-top:1px}
.feedback{padding:12px 16px;border-radius:12px;margin-bottom:14px;font-family:'Noto Serif JP',serif;font-size:.88rem;line-height:1.55;display:none;animation:slu .3s ease}
.feedback.show{display:block}
.fb-ok{background:rgba(24,200,122,.12);border:1px solid rgba(24,200,122,.4);color:#7fffd4}
.fb-err{background:rgba(200,23,58,.15);border:1px solid rgba(200,23,58,.4);color:#ffaaaa}
@keyframes slu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.p-badge{display:inline-flex;align-items:center;gap:7px;padding:5px 13px;border-radius:20px;font-size:.75rem;font-weight:800}
.bdot{width:7px;height:7px;border-radius:50%;animation:pdp 1.5s infinite}
.pc-icon{font-size:5rem;margin-bottom:10px;display:block;text-align:center}
.pc-title{font-family:'Cinzel',serif;font-size:clamp(1.3rem,4vw,1.9rem);color:var(--gold);text-shadow:0 0 28px rgba(248,200,50,.5);margin-bottom:10px;text-align:center}
.chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.chip{padding:5px 14px;border-radius:20px;font-size:.72rem;font-family:'Noto Serif JP',serif;border:1px solid rgba(248,200,50,.3);background:rgba(248,200,50,.08);color:var(--gold)}
.rank-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;margin-bottom:7px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03)}
.rank-item.r1{background:rgba(248,200,50,.1);border-color:rgba(248,200,50,.35)}
.rank-item.r2{background:rgba(192,192,192,.08);border-color:rgba(192,192,192,.25)}
.rank-item.r3{background:rgba(205,127,50,.08);border-color:rgba(205,127,50,.25)}
.scroll{max-height:360px;overflow-y:auto;padding-right:4px}
.scroll::-webkit-scrollbar{width:4px}
.scroll::-webkit-scrollbar-track{background:rgba(255,255,255,.05);border-radius:2px}
.scroll::-webkit-scrollbar-thumb{background:rgba(248,200,50,.3);border-radius:2px}
.final-score{font-family:'Cinzel',serif;font-size:3.2rem;color:var(--gold);text-shadow:0 0 30px rgba(248,200,50,.5);line-height:1;margin:10px 0}
.a1{animation:fdu .5s ease .08s both}.a2{animation:fdu .5s ease .18s both}.a3{animation:fdu .5s ease .3s both}.a4{animation:fdu .5s ease .44s both}.a5{animation:fdu .5s ease .58s both}
@keyframes fdu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.bst span{position:fixed;pointer-events:none;z-index:1000;font-size:1.4rem;animation:bst .85s forwards}
@keyframes bst{0%{opacity:1;transform:translate(-50%,-50%) scale(.1)}60%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(1.2)}100%{opacity:0;transform:translate(calc(var(--tx)*1.8),calc(var(--ty)*1.8)) scale(.4)}}
.tc{text-align:center}.mt8{margin-top:8px}.mt16{margin-top:16px}.mt24{margin-top:24px}.mb8{margin-bottom:8px}.mb16{margin-bottom:16px}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="ptcl" id="ptcl"></div>

<!-- HOME -->

<div class="scr on" id="s-home">
  <div style="position:absolute;top:14px;right:14px;z-index:5">
    <button class="btn btn-outline btn-sm" onclick="go('s-rank')">🏆 Ranking</button>
  </div>
  <div class="card a1">
    <div style="position:absolute;bottom:-40px;right:-20px;font-family:'Noto Serif JP',serif;font-size:16rem;opacity:.03;color:#fff;pointer-events:none;line-height:1;user-select:none">鬼</div>
    <div class="a2" style="text-align:center;margin-bottom:20px">
      <span class="logo-icon">⚔️</span>
      <div class="divl"></div>
      <h1 class="logo-title">Demon Slayer<br>Quiz</h1>
      <p class="logo-jp">鬼 滅 の 刃</p>
      <div class="divl"></div>
      <div class="divd"></div>
      <p style="color:var(--muted);font-size:.82rem;margin-top:6px;line-height:1.6">10 fases · Timer de 30s · Ranking de Caçadores</p>
    </div>
    <div class="mb16 a3">
      <label class="lbl">⚔ Seu nome de guerreiro</label>
      <input class="inp" id="pname" placeholder="Ex: Tanjiro Kamado…" maxlength="20" onkeydown="if(event.key==='Enter')startGame()">
    </div>
    <div class="a4">
      <label class="lbl">🗡 Escolha seu personagem</label>
      <div class="char-grid" id="cgrid"></div>
    </div>
    <div class="mt24 a5">
      <button class="btn btn-red" onclick="startGame()">⚔️ &nbsp;COMEÇAR MISSÃO</button>
      <p style="text-align:center;color:var(--muted);font-size:.72rem;margin-top:8px">Mínimo de acertos para avançar · Bônus de velocidade</p>
    </div>
  </div>
</div>

<!-- QUIZ -->

<div class="scr" id="s-quiz">
  <div class="card" id="qcard">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="p-badge" id="pbadge"></div>
      <div style="font-family:'Cinzel',serif;font-size:.9rem;color:var(--gold)">⭐ <span id="live-score">0</span></div>
    </div>
    <div class="prog-wrap">
      <div style="display:flex;justify-content:space-between;margin-bottom:7px">
        <span style="font-family:'Cinzel',serif;font-size:.72rem;color:var(--gold)" id="prog-ph">Fase 1</span>
        <span style="font-size:.72rem;color:var(--muted)" id="prog-q">Q 1/5</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="phase-dots" id="pdots"></div>
    </div>
    <div class="timer" id="timer">30</div>
    <div class="ph-banner">
      <div class="ph-num" id="ph-num">FASE 1 — NOVATO</div>
      <div class="ph-title" id="ph-title">Primeiros Passos</div>
    </div>
    <p style="text-align:center;font-size:.68rem;color:var(--muted);letter-spacing:2px;margin-bottom:10px" id="q-num">Questão 1 de 5</p>
    <p class="q-text" id="q-text"></p>
    <div class="opts" id="q-opts"></div>
    <div class="feedback" id="feedback"></div>
    <div class="tc" id="next-wrap" style="display:none">
      <button class="btn btn-gold" onclick="nextQ()">Próxima &nbsp;→</button>
    </div>
  </div>
</div>

<!-- PHASE CLEAR -->

<div class="scr" id="s-phclear">
  <div class="card card-sm tc" id="phclear-card"></div>
</div>

<!-- GAME OVER -->

<div class="scr" id="s-over">
  <div class="card card-sm tc">
    <span style="font-size:4rem;display:block;margin-bottom:12px">💀</span>
    <h2 class="pc-title" style="color:var(--crimson)">Missão Falhou!</h2>
    <p style="color:var(--muted);font-family:'Noto Serif JP',serif;line-height:1.6;margin-bottom:22px" id="over-msg"></p>
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap">
      <button class="btn btn-red" style="width:auto;padding:13px 24px" onclick="retry()">🔄 Tentar Novamente</button>
      <button class="btn btn-outline" onclick="go('s-home')">🏠 Início</button>
    </div>
  </div>
</div>

<!-- FINAL -->

<div class="scr" id="s-final">
  <div class="card card-sm tc" id="final-card"></div>
</div>

<!-- RANKING -->

<div class="scr" id="s-rank">
  <div class="card" style="max-width:560px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h2 class="pc-title" style="font-size:1.25rem;margin:0">🏆 Ranking de Caçadores</h2>
      <button class="btn btn-outline btn-sm" onclick="goBack()">← Voltar</button>
    </div>
    <div class="divl"></div>
    <div class="scroll" id="rank-list"></div>
    <p style="text-align:center;color:var(--muted);font-size:.72rem;margin-top:12px">Top 20 · Salvo no navegador</p>
  </div>
</div>

<script>

svg:`<svg viewBox="0 0 90 115" width="66" height="82"><defs><radialGradient id="sk2" cx="50%" cy="40%"><stop offset="0%" stop-color="#fce0b8"/><stop offset="100%" stop-color="#f0c090"/></radialGradient><radialGradient id="ey2" cx="35%" cy="30%"><stop offset="0%" stop-color="#e070b0"/><stop offset="100%" stop-color="#901060"/></radialGradient></defs>
<ellipse cx="45" cy="110" rx="20" ry="5" fill="rgba(0,0,0,.35)"/>

function getRank(s){
  if(s>=13000)return{name:'Respiração Total do Sol',lbl:'LENDA SUPREMA',color:'#ff8c00',bg:'rgba(255,140,0,.18)'};
  if(s>=9500) return{name:'Hashira',lbl:'PILAR',color:'#f8c832',bg:'rgba(248,200,50,.14)'};
  if(s>=6500) return{name:'Caçador Élite',lbl:'ÉLITE',color:'#c090f8',bg:'rgba(192,144,248,.14)'};
  if(s>=4000) return{name:'Caçador Experiente',lbl:'EXPERIENTE',color:'#5ad080',bg:'rgba(90,208,128,.14)'};
  if(s>=2000) return{name:'Caçador Iniciante',lbl:'INICIANTE',color:'#3a8fdc',bg:'rgba(58,143,220,.14)'};
  return{name:'Estudante de Respiração',lbl:'NOVATO',color:'#8a7060',bg:'rgba(138,112,96,.14)'};
}

// ── STATE ────────────────────────────────────────────────
var G={name:'',charId:null,phase:0,qIdx:0,score:0,correct:0,answered:false,timer:null,tv:30,prev:'s-home'};

// ── PARTICLES ────────────────────────────────────────────
(function(){
  var p=document.getElementById('ptcl');
  var em=['🌸','⚔️','🔥','💧','⭐','🌙','✨','🌺'];
  for(var i=0;i<18;i++){var s=document.createElement('span');s.textContent=em[Math.floor(Math.random()*em.length)];s.style.cssText='left:'+Math.random()*100+'%;font-size:'+(0.7+Math.random()*0.8)+'rem;animation-duration:'+(10+Math.random()*14)+'s;animation-delay:'+Math.random()*12+'s';p.appendChild(s)}
})();

// ── CHAR GRID ────────────────────────────────────────────
function buildGrid(){
  var g=document.getElementById('cgrid');g.innerHTML='';
  CHARS.forEach(function(c){
    var d=document.createElement('div');
    d.className='char-card'+(G.charId===c.id?' sel':'');
    d.style.borderColor=G.charId===c.id?c.color:'rgba(255,255,255,.1)';
    d.style.background=G.charId===c.id?c.bg:'rgba(255,255,255,.03)';
    if(G.charId===c.id)d.style.boxShadow='0 0 20px '+c.color+'55';
    d.innerHTML='<div class="char-svg">'+c.svg+'</div><div class="char-name">'+c.name+'</div><span class="char-rank" style="background:'+c.bg+';color:'+c.color+';border:1px solid '+c.color+'50">'+c.rank+'</span>';
    d.onclick=function(){G.charId=c.id;buildGrid()};
    g.appendChild(d);
  });
}
buildGrid();

// ── NAVIGATION ───────────────────────────────────────────
function go(id){
  G.prev=document.querySelector('.scr.on')?document.querySelector('.scr.on').id:'s-home';
  document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on')});
  document.getElementById(id).classList.add('on');
  if(id==='s-rank')renderRank();
}
function goBack(){go(G.prev||'s-home')}

// ── START ────────────────────────────────────────────────
function startGame(){
  var n=document.getElementById('pname').value.trim();
  if(!n){alert('Digite seu nome de guerreiro!');return}
  if(!G.charId){alert('Escolha um personagem!');return}
  G.name=n;G.phase=0;G.qIdx=0;G.score=0;G.correct=0;
  buildDots();loadQ();go('s-quiz');
}

// ── DOTS ─────────────────────────────────────────────────
function buildDots(){
  var w=document.getElementById('pdots');w.innerHTML='';
  PHASES.forEach(function(_,i){var d=document.createElement('div');d.className='pd'+(i<G.phase?' done':i===G.phase?' cur':'');d.textContent=i+1;w.appendChild(d)});
}
function updDots(){document.querySelectorAll('.pd').forEach(function(d,i){d.className='pd'+(i<G.phase?' done':i===G.phase?' cur':'')})}

// ── LOAD Q ───────────────────────────────────────────────
function loadQ(){
  var ph=PHASES[G.phase],qd=ph.questions[G.qIdx];G.answered=false;
  var ch=CHARS.find(function(c){return c.id===G.charId});
  var b=document.getElementById('pbadge');
  b.style.background=ch.bg;b.style.border='1px solid '+ch.color+'60';b.style.color=ch.color;
  b.innerHTML='<span class="bdot" style="background:'+ch.color+'"></span>'+ch.name+' / '+G.name;
  document.getElementById('live-score').textContent=G.score;
  document.getElementById('prog-ph').textContent='Fase '+ph.num+'/10';
  document.getElementById('prog-q').textContent='Q '+(G.qIdx+1)+'/'+ph.questions.length;
  var pct=((G.phase*5+G.qIdx)/(PHASES.length*5)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  updDots();
  document.getElementById('ph-num').textContent='FASE '+ph.num+' — '+ph.level;
  document.getElementById('ph-title').textContent=ph.emoji+' '+ph.title;
  document.getElementById('q-num').textContent='Questão '+(G.qIdx+1)+' de '+ph.questions.length;
  document.getElementById('q-text').textContent=qd.q;
  var oc=document.getElementById('q-opts');oc.innerHTML='';
  ['A','B','C','D'].forEach(function(l,i){
    var btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML='<span class="opt-ltr">'+l+'</span>'+qd.opts[i];
    btn.onclick=(function(ii,b){return function(){checkAns(ii,b,qd)}})(i,btn);
    oc.appendChild(btn);
  });
  var fb=document.getElementById('feedback');fb.className='feedback';fb.innerHTML='';
  document.getElementById('next-wrap').style.display='none';
  startTimer();
}

// ── TIMER ────────────────────────────────────────────────
function startTimer(){
  clearInterval(G.timer);G.tv=30;
  var el=document.getElementById('timer');el.textContent='30';el.className='timer';
  G.timer=setInterval(function(){
    G.tv--;el.textContent=G.tv;
    if(G.tv<=10)el.className='timer warn';
    if(G.tv<=0){clearInterval(G.timer);if(!G.answered)timeOut()}
  },1000);
}
function timeOut(){
  G.answered=true;
  var qd=PHASES[G.phase].questions[G.qIdx];
  document.querySelectorAll('.opt').forEach(function(b,i){b.disabled=true;if(i===qd.ans)b.classList.add('correct')});
  showFb(false,'⏰ Tempo esgotado! Resposta: <strong>'+qd.opts[qd.ans]+'</strong>',qd.tip);
  document.getElementById('next-wrap').style.display='block';
}

// ── CHECK ────────────────────────────────────────────────
function checkAns(idx,btn,qd){
  if(G.answered)return;G.answered=true;clearInterval(G.timer);
  document.querySelectorAll('.opt').forEach(function(b){b.disabled=true});
  var ok=idx===qd.ans;
  if(ok){btn.classList.add('correct');var bonus=Math.ceil(G.tv/30*50);G.score+=100+bonus;G.correct++;document.getElementById('live-score').textContent=G.score;showFb(true,'✅ Correto! +'+(100+bonus)+' pts (bônus: +'+bonus+')',qd.tip);burst(true)}
  else{btn.classList.add('wrong');document.querySelectorAll('.opt')[qd.ans].classList.add('correct');showFb(false,'❌ Errou! Resposta: <strong>'+qd.opts[qd.ans]+'</strong>',qd.tip);burst(false)}
  document.getElementById('next-wrap').style.display='block';
}
function showFb(ok,msg,tip){var fb=document.getElementById('feedback');fb.className='feedback show '+(ok?'fb-ok':'fb-err');fb.innerHTML=msg+'<br><small style="opacity:.7;font-size:.76rem">💡 '+tip+'</small>'}

// ── NEXT ─────────────────────────────────────────────────
function nextQ(){
  G.qIdx++;var ph=PHASES[G.phase];
  if(G.qIdx>=ph.questions.length){
    if(G.correct>=ph.minCorrect){if(G.phase===PHASES.length-1){saveScore();showFinal()}else showPhaseClear()}
    else{document.getElementById('over-msg').innerHTML='Você acertou '+G.correct+'/'+ph.questions.length+' na fase <strong>'+ph.title+'</strong>.<br>Mínimo necessário: '+ph.minCorrect+' acertos.';go('s-over')}
  }else loadQ();
}

// ── PHASE CLEAR ──────────────────────────────────────────
function showPhaseClear(){
  var ph=PHASES[G.phase];confetti();
  document.getElementById('phclear-card').innerHTML='<span class="pc-icon">'+ph.emoji+'</span><div class="divl"></div><h2 class="pc-title">⚔️ Fase Superada!</h2><p style="color:var(--muted);font-family:\'Noto Serif JP\',serif;line-height:1.6;margin-bottom:18px">Completou <strong style="color:var(--gold)">'+ph.title+'</strong><br>Acertos: '+G.correct+'/'+ph.questions.length+' · Score: <strong style="color:var(--gold)">'+G.score+'</strong></p><div class="chips"><span class="chip">⭐ '+G.score+' pts</span><span class="chip">✅ '+G.correct+' acertos</span><span class="chip">🏅 '+ph.title+'</span></div><button class="btn btn-red" style="margin-bottom:10px" onclick="advPhase()">▶ Próxima Fase</button><br><button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="go(\'s-rank\')">🏆 Ranking</button>';
  go('s-phclear');
}
function advPhase(){G.phase++;G.qIdx=0;G.correct=0;buildDots();loadQ();go('s-quiz')}
function retry(){G.qIdx=0;G.correct=0;loadQ();go('s-quiz')}

// ── FINAL ────────────────────────────────────────────────
function showFinal(){
  confetti();var rk=getRank(G.score);
  var ch=CHARS.find(function(c){return c.id===G.charId});
  document.getElementById('final-card').innerHTML='<span class="pc-icon">☀️</span><div class="divl"></div><h2 class="pc-title">Missão Completa!</h2><p style="color:var(--muted);font-family:\'Noto Serif JP\',serif;margin-bottom:10px">'+ch.name+' completou todas as 10 fases!</p><div class="final-score">'+G.score+'</div><p style="color:var(--muted);font-size:.8rem;margin-bottom:16px">pontos totais</p><div style="padding:16px 28px;border-radius:14px;margin:0 auto 20px;max-width:280px;background:'+rk.bg+';border:2px solid '+rk.color+'"><div style="font-size:.68rem;letter-spacing:4px;font-family:\'Cinzel\',serif;margin-bottom:6px;color:'+rk.color+'">'+rk.lbl+'</div><div style="font-family:\'Cinzel\',serif;font-size:1.5rem;font-weight:900;color:'+rk.color+'">'+rk.name+'</div></div><div style="display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap"><button class="btn btn-red" style="width:auto;padding:13px 22px" onclick="go(\'s-rank\')">🏆 Ranking</button><button class="btn btn-outline" onclick="restartGame()">🔄 Jogar Novamente</button></div>';
  go('s-final');
}
function restartGame(){G.charId=null;buildGrid();go('s-home')}

// ── SCORE ────────────────────────────────────────────────
function saveScore(){
  var ch=CHARS.find(function(c){return c.id===G.charId});
  var scores=[];try{scores=JSON.parse(localStorage.getItem('dsq_v4')||'[]')}catch{}
  scores.push({name:G.name,charId:G.charId,charName:ch.full,score:G.score,date:new Date().toLocaleDateString('pt-BR')});
  scores.sort(function(a,b){return b.score-a.score});
  try{localStorage.setItem('dsq_v4',JSON.stringify(scores.slice(0,20)))}catch{}
}
function renderRank(){
  var scores=[];try{scores=JSON.parse(localStorage.getItem('dsq_v4')||'[]')}catch{}
  var l=document.getElementById('rank-list');
  if(!scores.length){l.innerHTML='<p style="text-align:center;color:var(--muted);padding:24px;font-family:\'Noto Serif JP\',serif">Nenhuma pontuação ainda. Seja o primeiro!</p>';return}
  var medals=['🥇','🥈','🥉'];
  l.innerHTML=scores.map(function(r,i){
    var rk=getRank(r.score);var ch=CHARS.find(function(c){return c.id===r.charId});
    return '<div class="rank-item '+(i===0?'r1':i===1?'r2':i===2?'r3':'')+'"><div style="font-family:\'Cinzel\',serif;font-size:1rem;min-width:28px;text-align:center">'+(medals[i]||i+1)+'</div><div style="width:36px;height:44px;display:flex;align-items:center;justify-content:center">'+(ch?'<svg viewBox="10 28 70 70" width="32" height="38">'+ch.svg+'</svg>':'⚔️')+'</div><div style="flex:1"><div style="font-weight:800;font-size:.9rem;color:var(--white)">'+r.name+'</div><div style="font-size:.68rem;color:var(--muted);margin-top:2px">'+r.charName+' · '+r.date+'</div><span style="display:inline-block;padding:2px 10px;border-radius:20px;font-size:.6rem;font-weight:800;margin-top:4px;background:'+rk.bg+';color:'+rk.color+'">'+rk.name+'</span></div><div style="font-family:\'Cinzel\',serif;font-size:1rem;color:var(--gold)">'+r.score+'</div></div>';
  }).join('');
}

// ── EFFECTS ──────────────────────────────────────────────
function burst(ok){
  var em=ok?['⭐','✨','🌟','💫','⚔️']:['💀','🌑','👿','💔'];
  for(var i=0;i<7;i++){
    var s=document.createElement('span');s.textContent=em[Math.floor(Math.random()*em.length)];
    var a=(i/7)*360,d=80+Math.random()*60;
    s.style.cssText='position:fixed;pointer-events:none;z-index:1000;font-size:1.3rem;top:50%;left:50%;--tx:'+Math.cos(a*Math.PI/180)*d+'px;--ty:'+Math.sin(a*Math.PI/180)*d+'px;animation:bst .85s forwards';
    document.body.appendChild(s);setTimeout(function(){s.remove()},900);
  }
}
function confetti(){
  var cv=document.getElementById('cv');var ctx=cv.getContext('2d');cv.width=window.innerWidth;cv.height=window.innerHeight;
  var cols=['#f8c832','#c8173a','#e85a0a','#3a8fdc','#5ad080','#c090f8','#e060a0'];
  var p=[];for(var i=0;i<110;i++)p.push({x:Math.random()*cv.width,y:-15-Math.random()*100,vx:(Math.random()-.5)*5,vy:2+Math.random()*4,c:cols[Math.floor(Math.random()*cols.length)],w:6+Math.random()*8,h:3+Math.random()*5,r:Math.random()*360,rv:(Math.random()-.5)*9});
  var fr=0;
  function draw(){ctx.clearRect(0,0,cv.width,cv.height);p.forEach(function(q){ctx.save();ctx.translate(q.x,q.y);ctx.rotate(q.r*Math.PI/180);ctx.fillStyle=q.c+'CC';ctx.fillRect(-q.w/2,-q.h/2,q.w,q.h);ctx.restore();q.x+=q.vx;q.y+=q.vy;q.r+=q.rv});if(++fr<200)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height)}
  draw();
}
</script>
